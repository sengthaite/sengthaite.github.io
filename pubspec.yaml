name: sengthaite_blog
description: "SENGTHAITE_BLOG"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  intl: any
  # cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0
  freezed_annotation: ^3.0.0
  uuid: ^4.5.1
  markdown_widget: ^2.3.2+8
  front_matter_ml: ^1.2.0
  flutter_quill: ^11.5.0
  flutter_svg: ^2.2.3
  path: ^1.9.1
  google_fonts: ^8.1.0
  video_player: ^2.9.1
  markdown: ^7.2.2
  html: ^0.15.4
  dio: ^5.5.0+1
  modal_bottom_sheet: ^3.0.0
  camera: ^0.12.0+1
  device_preview: ^1.3.1
  hive_ce: ^2.15.1
  hive_ce_generator: ^1.9.0
  flutter_html: ^3.0.0-beta.2
  dart_jsonwebtoken: ^3.2.0
  file_picker: ^11.0.2
  pointycastle: ^4.0.0
  flutter_highlight: ^0.7.0
  dart_eval: ^0.8.2
  file_saver: ^0.4.0
  url_launcher: ^6.3.2
  flutter_code_editor: ^0.3.4
  highlight: ^0.7.0
  yaml: ^3.1.3
  barcode_widget: ^2.0.4
  barcode_image: ^2.0.3
  pdf: ^3.11.3
  file_selector: ^1.1.0
  image: ^4.5.4
  rxdart: ^0.28.0
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.6
  rename_app: ^1.6.5
  qr_code_vision: ^0.1.2
  markdown_quill: ^4.3.0
  flutter_spinkit: ^5.2.2
  go_router: ^17.1.0
  vsc_quill_delta_to_html: ^1.0.5
  flutter_quill_to_pdf: ^2.3.9
  flutter_localization: ^0.4.0
  flutter_localizations:
    sdk: flutter
  flutter_smooth_markdown: ^0.7.2
  share_plus: ^12.0.2
  styled_text: ^9.0.0
  material_symbols_icons: ^4.2951.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^3.2.3
  icons_launcher: ^3.0.3

flutter:
  uses-material-design: true
  generate: true
  config: 
    enable-swift-package-manager: true
  assets:
    - assets/
    - assets/contents/
    - assets/contents/Biography/
    - assets/contents/Database/
    - assets/contents/Tool/
    - assets/contents/CLI/
    - assets/contents/Cambodia/
    - assets/contents/General/
    - assets/contents/Csharp/
    - assets/contents/LLVM/
    - assets/contents/Angular/
    - assets/contents/Flutter/
    # - assets/contents/Kotlin/
    - assets/contents/Reverse_Engineer/
    - assets/contents/iOS/
    - assets/contents/Swift/
    - assets/contents/Android/
    # - assets/contents/Maths/
    - assets/contents/OS/
    - assets/autogen_meta/
    - assets/tool_icons/
    - assets/content_icons/
    - assets/portfolio/
    - assets/certs_archivements/

icons_launcher:
  image_path: 'assets/icon/icon.png'
  platforms:
    android:
      enable: true
      image_path: 'assets/icon/icon.png'
    ios:
      enable: true
      image_path: 'assets/icon/icon.png'
    web:
      enable: true
      image_path: 'assets/icon/icon.png'
    macos:
      enable: true
      image_path: 'assets/icon/icon.png'
    windows:
      enable: true
      image_path: 'assets/icon/icon.png'
    linux:
      enable: true
      image_path: 'assets/icon/icon.png'
    

targets:
  $default:
    builders:
      build_web_compilers|entrypoint:
        options:
          tree_shake: true
