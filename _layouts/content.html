<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css"
      id="light-theme"
    />
    <link
      rel="stylesheet"
      href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css"
      id="dark-theme"
    />
    <link rel="stylesheet" href="/assets/css/content.css" />
    <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
  </head>
  <body>
    <div class="container">{{ content }}</div>
  </body>
  <script>
    hljs.highlightAll()

    const THEME = "sengthaite.theme"

    const theme = localStorage.getItem(THEME) ?? "light"

    document.documentElement.setAttribute("data-theme", theme)

    let darkTheme = document.getElementById("dark-theme")
    let lightTheme = document.getElementById("light-theme")

    if (theme == "dark") {
      darkTheme.removeAttribute("disabled")
      lightTheme.setAttribute("disabled", "disabled")
    } else {
      darkTheme.setAttribute("disabled", "disabled")
      lightTheme.removeAttribute("disabled")
    }
    
  </script>
</html>
