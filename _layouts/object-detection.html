<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection with TensorFlow.js</title>
    <script src="/assets/js/theme.js"></script>
    <!-- Include TensorFlow.js library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- Include COCO-SSD model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <link rel="stylesheet" href="/assets/css/object-detection.css">
</head>

<body>
    <div id="container">
        <video id="video" width="640" height="480" autoplay></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <script>
        // Get video element
        const video = document.getElementById('video');

        // Get canvas element for drawing bounding boxes
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        // Load COCO-SSD model
        cocoSsd.load().then(model => {
            // Start webcam
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    video.srcObject = stream;
                })
                .catch((error) => {
                    console.error('Error accessing webcam:', error);
                });

            // Detect objects in each video frame
            video.addEventListener('loadeddata', () => {
                setInterval(() => {
                    detectObjects(model);
                }, 1000); // Adjust the interval based on your preference
            });
        });

        function detectObjects(model) {
            // Make predictions
            model.detect(video).then(predictions => {
                // Clear previous drawings
                context.clearRect(0, 0, canvas.width, canvas.height);

                // Draw bounding boxes and labels
                predictions.forEach(prediction => {
                    context.beginPath();
                    context.rect(
                        prediction.bbox[0],
                        prediction.bbox[1],
                        prediction.bbox[2],
                        prediction.bbox[3]
                    );
                    context.lineWidth = 2;
                    context.strokeStyle = 'red';
                    context.fillStyle = 'red';
                    context.stroke();
                    context.font = '16px Arial';
                    context.fillText(
                        `${prediction.class} (${Math.round(prediction.score * 100)}%)`,
                        prediction.bbox[0],
                        prediction.bbox[1] > 10 ? prediction.bbox[1] - 5 : 10
                    );
                });
            });
        }
    </script>
</body>

</html>
